name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (iOS Simulator)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build and test
        # TEST_RUNNER_ prefix: xcodebuild forwards the var (prefix stripped) into
        # the test process, where the on-device generation test checks for CI.
        # The runner's own CI var never reaches the simulator process.
        env:
          TEST_RUNNER_CI: "true"
        run: |
          xcodebuild -project Fable.xcodeproj -scheme Fable \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO \
            build test
