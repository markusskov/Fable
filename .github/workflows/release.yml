name: Release

# Pushing a v* tag (created by `scripts/release.sh tag` after the release PR
# merges) publishes a GitHub Release whose notes are that version's CHANGELOG
# section. No build artifacts: archiving/upload runs from Xcode on the dev
# machine until CI signing exists.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Extract this version's changelog section
        run: |
          awk -v tag="$GITHUB_REF_NAME" '
            found && /^## v/ { exit }
            found { print }
            index($0, "## " tag " ") == 1 { found = 1 }
          ' CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            echo "No '## $GITHUB_REF_NAME' section in CHANGELOG.md" >&2
            exit 1
          fi
          cat /tmp/notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "Fable ${GITHUB_REF_NAME#v}" \
            --notes-file /tmp/notes.md
