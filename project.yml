name: Fable
options:
  bundleIdPrefix: com.markusskov
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
targets:
  Fable:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusskov.fable
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Fable
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  FableTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Fable
schemes:
  Fable:
    build:
      targets:
        Fable: all
        FableTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FableTests
