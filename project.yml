name: Fable
options:
  bundleIdPrefix: com.markusskov
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N2M33U7L7U
targets:
  Fable:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusskov.fable
        # iPhone-only for v1 (roadmap defers a real iPad layout to post-1.0);
        # iPad runs the app in compatibility mode and ASC then needs no iPad
        # screenshots. Flip to "1,2" only alongside actual iPad layout work.
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Fable
        # Only Apple's OS-provided TLS/StoreKit crypto — exempt, so App Store
        # Connect never pauses builds on the export-compliance question.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  # Drives the real app through a staged evening and exports the App Store
  # screenshot set. Own scheme below — never part of CI's `Fable` scheme.
  # Run via scripts/capture-screenshots.sh.
  FableScreenshots:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - App/UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Fable
    dependencies:
      - target: Fable
  FableTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
      # Bundled so the tests can validate it; the app itself never reads it
      # (Xcode's Run action applies it, and the real store is the App Store).
      - path: App/StoreKit/Fable.storekit
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Fable
schemes:
  Fable:
    build:
      targets:
        Fable: all
        FableTests: [test]
    run:
      config: Debug
      storeKitConfiguration: App/StoreKit/Fable.storekit
    test:
      config: Debug
      targets:
        - FableTests
  FableScreenshots:
    build:
      targets:
        Fable: all
        FableScreenshots: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FableScreenshots
